# DigitalOcean App Platform Configuration
# This configuration deploys Tabbycat with external PostgreSQL database
name: tabbycat-debate
region: nyc
services:
  # Main Django Web Application
  - name: web
    source_dir: /
    github:
      repo: Taraldinn/tabbycat
      branch: main
      deploy_on_push: true
    build_command: ./bin/digitalocean-build-basic.sh
    run_command: python tabbycat/run-asgi.py
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      # Database Configuration (External PostgreSQL required)
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "postgresql://username:password@host:port/database"
      
      # Django Configuration
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "your-super-secret-key-change-this-in-production"
      
      - key: DEBUG
        scope: RUN_TIME
        value: "0"
      
      - key: ON_DIGITALOCEAN
        scope: RUN_TIME
        value: "1"
      
      - key: ALLOWED_HOSTS
        scope: RUN_TIME
        value: "*"
      
      - key: PYTHON_VERSION
        scope: BUILD_TIME
        value: "3.11"
      
      - key: NODE_VERSION
        scope: BUILD_TIME
        value: "18"
      
      # App Configuration
      - key: WEB_CONCURRENCY
        scope: RUN_TIME
        value: "1"
      
      - key: TIME_ZONE
        scope: RUN_TIME
        value: "UTC"
      
      # Security Settings
      - key: SECURE_SSL_REDIRECT
        scope: RUN_TIME
        value: "1"
      
      - key: SESSION_COOKIE_SECURE
        scope: RUN_TIME
        value: "1"
      
      - key: CSRF_COOKIE_SECURE
        scope: RUN_TIME
        value: "1"

      # Optional: Tab Director Email for notifications
      - key: TAB_DIRECTOR_EMAIL
        scope: RUN_TIME
        value: "your-email@example.com"
      
      # Memory optimization for 1GB RAM
      - key: GUNICORN_MAX_REQUESTS
        scope: RUN_TIME
        value: "1000"
      
      - key: GUNICORN_MAX_REQUESTS_JITTER
        scope: RUN_TIME
        value: "100"

# Note: For Basic plan, we don't include Redis or worker services
# to conserve resources and reduce costs

static_sites: []
jobs: []
workers: []
